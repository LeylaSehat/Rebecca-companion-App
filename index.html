<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<title>Rebecca's Daily DJ 🎧</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#08080F;font-family:'Trebuchet MS',sans-serif;overscroll-behavior:none;}
  #app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;}
  button{font-family:inherit;cursor:pointer;}
  input{font-family:inherit;}

  @keyframes djbar0{from{height:15%}to{height:95%}}
  @keyframes djbar1{from{height:35%}to{height:70%}}
  @keyframes djbar2{from{height:10%}to{height:100%}}
  @keyframes djbar3{from{height:50%}to{height:80%}}
  @keyframes djbar4{from{height:20%}to{height:90%}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes popUp{from{transform:scale(.55);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes popUpSm{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes ringPulse{0%{transform:scale(.8);opacity:.3}100%{transform:scale(1.4);opacity:0}}
  @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes shimmer{0%{transform:translateX(-200%)}100%{transform:translateX(200%)}}
  @keyframes float0{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

  {id:"wake",        time:"07:00",end:"07:05",emoji:"🌅",label:"Drop In",          invite:"Your set starts NOW — let's go! 🎧",             coins:5,  req:true, urgent:false,cat:"morning"},
  {id:"toilet",      time:"07:05",end:"07:15",emoji:"🚽",label:"Quick Pit Stop",   invite:"Phone stays right here 🤝 — back in 2!",          coins:10, req:true, urgent:true, cat:"morning"},
  {id:"brush",       time:"07:10",end:"07:13",emoji:"🦷",label:"Fresh Smile",      invite:"2 min — then you're sparkling! ✨",               coins:8,  req:true, urgent:false,cat:"morning"},
  {id:"hair",        time:"07:13",end:"07:15",emoji:"✨",label:"Hair Check",       invite:"You always look amazing — make it official! 💃",  coins:8,  req:true, urgent:false,cat:"morning"},
  {id:"meds",        time:"07:15",end:"07:25",emoji:"💊",label:"Power Up",         invite:"Daily vitamins = energy for your whole day!",     coins:10, req:true, urgent:false,cat:"morning"},
  {id:"dress",       time:"07:25",end:"07:40",emoji:"👗",label:"Outfit Drop",      invite:"YOUR style, YOUR choice — own the look! 🔥",      coins:8,  req:true, urgent:false,cat:"morning"},
  {id:"bed",         time:"07:40",end:"07:50",emoji:"🛏️",label:"Tidy Vibes",      invite:"Clean space = clear mind = better beats!",        coins:6,  req:false,urgent:false,cat:"morning"},
  {id:"lunchbag",    time:"07:50",end:"08:00",emoji:"🎒",label:"Pack Your Gear",   invite:"Don't forget your snacks — DJs need fuel! 🍎",    coins:6,  req:true, urgent:false,cat:"morning"},
  {id:"breakfast",   time:"08:00",end:"08:10",emoji:"🍳",label:"Fuel The Set",     invite:"Breakfast first — then the world! 🌍",            coins:8,  req:true, urgent:false,cat:"morning"},
  {id:"leave",       time:"08:10",end:"08:15",emoji:"🚌",label:"Stage Call!",      invite:"Go SMASH it today, Rebecca! 🎉",                  coins:15, req:true, urgent:false,cat:"morning"},
  {id:"lunch",       time:"12:00",end:"12:30",emoji:"🥗",label:"Midday Break",     invite:"Earned it — enjoy every bite! 😊",                coins:6,  req:false,urgent:false,cat:"afternoon"},
  {id:"dinner",      time:"19:30",end:"20:00",emoji:"🍽️",label:"Dinner Set",      invite:"Sit back, relax, refuel!",                        coins:6,  req:false,urgent:false,cat:"evening"},
  {id:"tv",          time:"20:00",end:"21:30",emoji:"📺",label:"Chill Mode",       invite:"YOU pick tonight — remote's all yours! 🎬",       coins:0,  req:false,urgent:false,cat:"evening"},
  {id:"nightbrush",  time:"21:30",end:"21:35",emoji:"🌙",label:"Night Sparkle",    invite:"Last track of the night — quick brush!",          coins:8,  req:true, urgent:false,cat:"night"},
  {id:"nighttoilet", time:"21:35",end:"21:40",emoji:"🚿",label:"Last Stop",        invite:"Then you're 100% free to rest!",                  coins:8,  req:true, urgent:false,cat:"night"},
  {id:"sleep",       time:"21:45",end:"22:00",emoji:"💤",label:"After Party Over", invite:"You KILLED it today. Sleep well, superstar ⭐",   coins:10, req:true, urgent:false,cat:"night"},
];

const REWARDS = [
  {coins:30, emoji:"🎵",label:"30 min extra music",       tag:"MUSIC"},
  {coins:60, emoji:"🎧",label:"Choose tonight's playlist", tag:"MUSIC"},
  {coins:100,emoji:"🎤",label:"Karaoke session!",          tag:"FUN"},
  {coins:150,emoji:"🎬",label:"Movie night — your pick",   tag:"FUN"},
  {coins:200,emoji:"🛍️",label:"Shopping trip!",           tag:"OUTING"},
  {coins:250,emoji:"🍕",label:"Pick dinner tonight",       tag:"FOOD"},
  {coins:400,emoji:"🎪",label:"Special day out",           tag:"OUTING"},
];

const HYPE = [
  {h:"BEAT DROP! 🎛️",s:"Rebecca just owned that!"},
  {h:"LET'S GO!! 🔥",s:"The crowd is going wild!"},
  {h:"BIG TUNE! 🎧",s:"Rebecca on the decks!"},
  {h:"SLAY!! 💃",s:"No one does it like you!"},
  {h:"MASSIVE! 🏆",s:"Chart-topper right here!"},
  {h:"YASS QUEEN! 👑",s:"Rebecca runs this show!"},
  {h:"ON FIRE! 🔥",s:"Unstoppable today!"},
  {h:"DROP IT! 🎶",s:"Rebecca keeps delivering!"},
];

const CAT_STYLE = {
  morning:  {grad:"linear-gradient(135deg,#FF6B35,#FF2D78)",label:"MORNING SET 🌅"},
  afternoon:{grad:"linear-gradient(135deg,#00B4DB,#0083B0)",label:"MIDDAY SET ☀️"},
  evening:  {grad:"linear-gradient(135deg,#9B59B6,#BF5FFF)",label:"EVENING SET 🌆"},
  night:    {grad:"linear-gradient(135deg,#1a1a2e,#4B79C5)",label:"NIGHT SET 🌙"},
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
const toMin = t => { const [h,m]=t.split(":").map(Number); return h*60+m; };
const nowMin = () => { const n=new Date(); return n.getHours()*60+n.getMinutes(); };
const isWeekday = () => { const d=new Date().getDay(); return d>=1&&d<=5; };
const fmtClock = d => d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
const fmtDate  = d => d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
const pick = arr => arr[Math.floor(Math.random()*arr.length)];

// ── STATE ─────────────────────────────────────────────────────────────────────
const SK = "rebecca_dj_v1";
let STATE = {
  done:{}, totalCoins:0, todayCoins:0, streak:0, pin:"1234",
  tab:"home", parentOpen:false, pinInput:"", pinErr:false,
  beatDrop:null, reminder:null, gateTasks:[], showGate:false,
  now: new Date(), newPin:""
};

function loadState() {
  try {
    const r=localStorage.getItem(SK); if(!r) return;
    const d=JSON.parse(r);
    if(d.date!==new Date().toDateString()){
      STATE.done={}; STATE.todayCoins=0;
    } else {
      STATE.done=d.done||{};
      STATE.totalCoins=d.totalCoins||0;
      STATE.todayCoins=d.todayCoins||0;
      STATE.streak=d.streak||0;
      STATE.pin=d.pin||"1234";
    }
  } catch{}
}

function saveState() {
  try {
    localStorage.setItem(SK, JSON.stringify({
      done:STATE.done, totalCoins:STATE.totalCoins,
      todayCoins:STATE.todayCoins, streak:STATE.streak,
      pin:STATE.pin, date:new Date().toDateString()
    }));
  } catch{}
}

const notified = {};

// ── AUDIO ─────────────────────────────────────────────────────────────────────
function playBeat(type="drop") {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const seqs={
      drop:[{f:220,t:0},{f:440,t:.1},{f:660,t:.2},{f:880,t:.3},{f:1100,t:.38},{f:1320,t:.45}],
      warn:[{f:440,t:0},{f:554,t:.12},{f:440,t:.24}],
    };
    (seqs[type]||seqs.drop).forEach(({f,t})=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type="sine";o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(.15,ctx.currentTime+t+.04);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.3);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.35);
    });
  } catch{}
}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v]) => {
    if (k==="style" && typeof v==="object") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k==="className") e.className=v;
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c==null||c===false) return;
    e.appendChild(typeof c==="string"||typeof c==="number" ? document.createTextNode(c) : c);
  });
  return e;
}

function bars(active=true, color="#00F5FF", h=24, n=7) {
  const wrap = el("div",{style:{display:"flex",alignItems:"flex-end",gap:"3px",height:h+"px"}});
  for(let i=0;i<n;i++){
    const b=el("div",{style:{
      width:"4px",borderRadius:"2px",background:color,
      height: active ? (25+((i*37+13)%75))+"%" : "15%",
      animation: active ? `djbar${i%5} ${.45+i*.09}s ease-in-out infinite alternate` : "none",
      transition:"height .4s",
    }});
    wrap.appendChild(b);
  }
  return wrap;
}

// ── MARK DONE ─────────────────────────────────────────────────────────────────
function markDone(id) {
  const task=TASKS.find(t=>t.id===id);
  if(!task||STATE.done[id]) return;
  playBeat("drop");
  STATE.done[id]=true;
  if(task.coins>0){
    STATE.totalCoins+=task.coins;
    STATE.todayCoins+=task.coins;
    STATE.beatDrop={hype:pick(HYPE),coins:task.coins};
  }
  if(STATE.reminder&&STATE.reminder.task&&STATE.reminder.task.id===id) STATE.reminder=null;
  STATE.gateTasks=STATE.gateTasks.filter(t=>t.id!==id);
  if(STATE.gateTasks.length===0) STATE.showGate=false;
  saveState();
  render();
}

// ── DERIVED ───────────────────────────────────────────────────────────────────
function getDerived() {
  const nm=nowMin();
  const reqTasks=TASKS.filter(t=>t.req);
  const doneReq=reqTasks.filter(t=>STATE.done[t.id]).length;
  const pct=Math.round((doneReq/reqTasks.length)*100);
  const activeTask=TASKS.find(t=>toMin(t.time)<=nm&&toMin(t.end)>nm&&!STATE.done[t.id]);
  const nextTask=TASKS.find(t=>toMin(t.time)>nm&&!STATE.done[t.id]);
  const unlockedCount=REWARDS.filter(r=>STATE.totalCoins>=r.coins).length;
  return {nm,reqTasks,doneReq,pct,activeTask,nextTask,unlockedCount};
}

    const sub=el("div",{style:{color:"rgba(255,255,255,.3)",fontSize:"12px",marginTop:"2px"}});sub.textContent=t.time+" · 🪙 +"+t.coins+" coins";
    info.appendChild(lbl);info.appendChild(sub);
    const btn=el("button",{
      style:{background:"linear-gradient(135deg,#00F5FF,#BF5FFF)",color:"#08080F",border:"none",borderRadius:"12px",padding:"11px 18px",fontWeight:"900",fontSize:"14px",boxShadow:"0 0 20px rgba(0,245,255,.35)",whiteSpace:"nowrap"},
      onClick:()=>markDone(t.id)

    card.appendChild(em);card.appendChild(info);card.appendChild(btn);

  wrap.appendChild(inner);

// ── BEAT DROP ─────────────────────────────────────────────────────────────────
function renderBeatDrop(hype,coins,onClose) {

// ── REMINDER POPUP ────────────────────────────────────────────────────────────
function renderReminder(task,type,onDone,onSnooze) {

  const inv=el("div",{style:{fontSize:"14px",color:"rgba(255,255,255,.6)",marginBottom:"8px",lineHeight:"1.5"}});

// ── HOME TAB ──────────────────────────────────────────────────────────────────
function renderHome(d) {
  const {pct,doneReq,reqTasks,activeTask,nextTask,unlockedCount} = d;
  const wrap=el("div",{style:{paddingBottom:"90px"}});

  // Header
  const header=el("div",{style:{background:"linear-gradient(160deg,#08080F,#12082A)",padding:"40px 22px 62px",position:"relative",overflow:"hidden"}});

  header.appendChild(gridBg);

  const hInner=el("div",{style:{position:"relative"}});
  const dateRow=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}});
  dateRow.appendChild(bars(isWeekday()&&!!activeTask,"#00F5FF",18,8));
  const dateTxt=el("span",{style:{fontSize:"10px",fontWeight:"800",letterSpacing:"3px",color:"rgba(0,245,255,.5)"}});
  dateTxt.textContent=fmtDate(STATE.now).toUpperCase();

  hInner.appendChild(dateRow);

  const djTag=el("div",{style:{fontSize:"10px",fontWeight:"800",letterSpacing:"3px",color:"rgba(255,45,120,.7)",marginBottom:"4px"}});
  djTag.textContent="🎧 DJ REBECCA";
  const clockEl=el("div",{style:{fontSize:"38px",fontWeight:"900",color:"white",letterSpacing:"2px",textShadow:"0 0 30px rgba(0,245,255,.4)"}});
  clockEl.textContent=fmtClock(STATE.now);
  const greetEl=el("div",{style:{fontSize:"22px",fontWeight:"900",color:"rgba(255,255,255,.8)",marginTop:"2px"}});
  const hr=STATE.now.getHours();
  greetEl.textContent=(hr<12?"Morning":hr<17?"Afternoon":"Evening")+" vibes 🌸";

function tryUnlock(inp, errEl) {
  if(STATE.pinInput===STATE.pin){
    STATE.parentOpen=true;STATE.pinErr=false;STATE.pinInput="";render();

    STATE.pinErr=true;STATE.pinInput="";
    if(inp) inp.value="";

  }
}

  if(!isWeekday()) return;
  const nm=nowMin();

  const upcoming=TASKS.find(t=>{const s=toMin(t.time);return s>nm&&s<=nm+5&&!STATE.done[t.id]&&!notified["up_"+t.id];});
  if(upcoming){notified["up_"+upcoming.id]=true;STATE.reminder={task:upcoming,type:"upcoming"};render();return;}

  const active=TASKS.find(t=>{const s=toMin(t.time),e=toMin(t.end);return nm>=s&&nm<e&&!STATE.done[t.id]&&!notified["act_"+t.id];});
  if(active){notified["act_"+active.id]=true;STATE.reminder={task:active,type:active.urgent?"urgent":"active"};render();return;}

  const overdue=TASKS.filter(t=>t.req&&toMin(t.end)<nm&&!STATE.done[t.id]);
  if(overdue.length>0&&JSON.stringify(overdue.map(t=>t.id))!==JSON.stringify(STATE.gateTasks.map(t=>t.id))){
    STATE.gateTasks=overdue;STATE.showGate=true;render();
  } else if(overdue.length===0&&STATE.showGate){
    STATE.showGate=false;render();
  }
}

// Urgent toilet re-reminder
setInterval(()=>{
  const nm=nowMin();
  if(nm>=toMin("07:05")&&nm<toMin("07:15")&&!STATE.done["toilet"]&&!STATE.reminder){
    STATE.reminder={task:TASKS.find(t=>t.id==="toilet"),type:"urgent"};render();
  }
},30000);

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render() {
  const app=document.getElementById("app");
  app.innerHTML="";

  const d=getDerived();

  // Gate screen
  if(STATE.showGate&&STATE.gateTasks.length>0){
    app.appendChild(renderGate());
    if(STATE.beatDrop){
      const bd=renderBeatDrop(STATE.beatDrop.hype,STATE.beatDrop.coins,()=>{STATE.beatDrop=null;render();});
      app.appendChild(bd);
    }
    return;
  }

  // Beat drop overlay
  if(STATE.beatDrop){
    const bd=renderBeatDrop(STATE.beatDrop.hype,STATE.beatDrop.coins,()=>{STATE.beatDrop=null;render();});
    app.appendChild(bd);
  }

  // Reminder overlay
  if(STATE.reminder){
    const rm=renderReminder(
      STATE.reminder.task, STATE.reminder.type,
      ()=>{markDone(STATE.reminder.task.id);STATE.reminder=null;render();},
      ()=>{STATE.reminder=null;render();}
    );
    app.appendChild(rm);
  }

  // Tab content
  if(STATE.tab==="home")     app.appendChild(renderHome(d));
  if(STATE.tab==="schedule") app.appendChild(renderSchedule(d.nm));
  if(STATE.tab==="rewards")  app.appendChild(renderRewards());
  if(STATE.tab==="parent")   app.appendChild(renderParent(d));

  // Nav
  app.appendChild(renderNav());
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadState();

// Request notifications
if("Notification" in window && Notification.permission==="default")
  Notification.requestPermission();

// Clock tick
setInterval(()=>{STATE.now=new Date();render();},1000);

// Reminder check every 30s
setInterval(checkReminders,30000);
checkReminders();

render();
</script>
</body>
</html>
